<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edgar Jair Vazquez V.</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <!-- Anti-flash: aplica el tema guardado ANTES de que cargue cualquier CSS -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-bs-theme', t);
            } catch (e) { }
        })();
    </script>
    <!-- Bootstrap 5.3.3 (dark mode nativo via data-bs-theme) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link href="EdgarJairVazquezVillarreal.styles.css" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon.svg" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="loader-container">
            <div class="loader-content">
                <div class="hex-spinner"></div>
                <div class="loader-text">Cargando...</div>
                <div class="loader-bar">
                    <div class="loader-progress"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Limpia service workers para evitar problemas de caché
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
                for (let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
</body>

</html>
